<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat Sistem PMBM...</title>
    
    <script>
        // Mengalihkan siswa secara instan ke server Google tanpa peringatan
        window.location.replace("https://script.google.com/macros/s/AKfycby0KbGTCJvRoo56DE6JnOIF0v18Cny43peAdacnjKyoDk8qa7_S8BRYMMQuBSvOfdspgQ/exec");
    </script>
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; 
            background-color: #f4f7f6; /* Warna abu-abu terang yang lembut */
            display: flex; justify-content: center; align-items: center;
        }
        
        /* Animasi Loading Estetik */
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(0, 107, 63, 0.2); /* Warna hijau transparan */
            border-top-color: #006b3f; /* Warna hijau solid Kemenag */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <div class="spinner"></div>

</body>
