<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMBM MTsN 1 Kendari</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        /* Tampilan Layar Belakang yang Bersih dan Profesional */
        .loader-container { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; z-index: 1; width: 90%; 
        }
        
        /* Animasi Putar yang Estetik */
        .spinner { 
            width: 45px; height: 45px; 
            border: 4px solid rgba(0, 107, 63, 0.2); 
            border-top-color: #006b3f; border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto 15px auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .teks-loading { color: #006b3f; font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.5px; }
        
        /* Tombol Bantuan Tersembunyi (Muncul Halus Jika Diperlukan) */
        .tombol-bantuan { 
            opacity: 0; visibility: hidden; transition: opacity 1s ease; margin-top: 15px; 
        }
        .tombol-bantuan.muncul { 
            opacity: 1; visibility: visible; 
        }
        .btn-bantuan { 
            background-color: #006b3f; color: white; padding: 10px 22px; 
            text-decoration: none; border-radius: 8px; font-size: 0.9rem; 
            font-weight: 500; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        
        /* Frame Aplikasi Google */
        iframe { 
            width: 100%; height: 100%; border: none; 
            position: absolute; top: 0; left: 0; z-index: 10; background: transparent; 
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <div class="teks-loading">Menyiapkan Sistem PMBM...</div>
        
        <div class="tombol-bantuan" id="bantuan">
            <p style="color: #666; font-size: 0.85rem; margin-bottom: 12px;">Membutuhkan waktu lebih lama dari biasanya.<br>Klik tombol di bawah jika form belum muncul.</p>
            <a href="https://script.google.com/macros/s/AKfycby0KbGTCJvRoo56DE6JnOIF0v18Cny43peAdacnjKyoDk8qa7_S8BRYMMQuBSvOfdspgQ/exec" class="btn-bantuan">Masuk ke Form</a>
        </div>
    </div>

    <iframe src="https://script.google.com/macros/s/AKfycby0KbGTCJvRoo56DE6JnOIF0v18Cny43peAdacnjKyoDk8qa7_S8BRYMMQuBSvOfdspgQ/exec" allow="camera; microphone"></iframe>

    <script>
        // Fungsi cerdas: Tampilkan tombol bantuan hanya jika setelah 7 detik layar masih macet (diblokir browser)
        setTimeout(function() {
            document.getElementById('bantuan').classList.add('muncul');
        }, 7000);
    </script>

</body>
</html>
